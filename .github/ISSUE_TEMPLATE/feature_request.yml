name: Feature request / Funkciójavaslat
description: Propose a compatible improvement / Kompatibilis fejlesztési javaslat
title: '[Feature]: '
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Probléma
      description: Which user or integration problem should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution / Javasolt megoldás
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and trade-offs / Alternatívák és kompromisszumok
  - type: checkboxes
    id: constraints
    attributes:
      label: Project constraints / Projektkorlátok
      options:
        - label: I considered backward compatibility. / Figyelembe vettem a kompatibilitást.
          required: true
        - label: I considered bounded memory/concurrency and upstream VIES limits. / Figyelembe vettem a terhelési korlátokat.
          required: true
