version: 2
updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:00'
      timezone: Europe/Budapest
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - java

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:30'
      timezone: Europe/Budapest
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
