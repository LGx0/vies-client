name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# EN: Repository code is built with read-only permissions. Only the isolated
# publish job receives release-write authority.
# HU: A repository kódja csak olvasási joggal épül; kiadási írásjogot kizárólag
# az elkülönített publikáló job kap.
permissions:
  contents: read

jobs:
  build:
    name: Verify trusted tag and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.project.outputs.version }}

    steps:
      - name: Check out tagged source without persisted credentials
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Resolve Maven version
        id: project
        shell: bash
        run: |
          version="$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify signed tag, version and protected-main ancestry
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PROJECT_VERSION: ${{ steps.project.outputs.version }}
        run: |
          test "$GITHUB_REF_NAME" = "v${PROJECT_VERSION}"
          ref_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${GITHUB_REF_NAME}")"
          test "$(jq -r '.object.type' <<< "$ref_json")" = "tag"
          tag_sha="$(jq -r '.object.sha' <<< "$ref_json")"
          tag_json="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}")"
          test "$(jq -r '.object.sha' <<< "$tag_json")" = "$GITHUB_SHA"
          jq -e '.verification.verified == true' <<< "$tag_json"
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Verify and package release
        run: ./mvnw --batch-mode --no-transfer-progress clean verify

      - name: Generate SHA-256 checksums
        shell: bash
        env:
          PROJECT_VERSION: ${{ steps.project.outputs.version }}
        run: |
          cd target
          sha256sum \
            "vies-client-${PROJECT_VERSION}.jar" \
            "vies-client-${PROJECT_VERSION}-sources.jar" \
            "vies-client-${PROJECT_VERSION}-javadoc.jar" > SHA256SUMS

      - name: Stage immutable release artifacts
        shell: bash
        env:
          PROJECT_VERSION: ${{ steps.project.outputs.version }}
        run: |
          mkdir release-artifacts
          cp \
            "target/vies-client-${PROJECT_VERSION}.jar" \
            "target/vies-client-${PROJECT_VERSION}-sources.jar" \
            "target/vies-client-${PROJECT_VERSION}-javadoc.jar" \
            target/SHA256SUMS \
            release-artifacts/

      - name: Upload verified artifacts for the isolated publisher
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Attest and publish
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Download verified artifacts only
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: release-artifacts
          path: release-artifacts

      - name: Attest JAR provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: 'release-artifacts/*.jar'

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PROJECT_VERSION: ${{ needs.build.outputs.version }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "release-artifacts/vies-client-${PROJECT_VERSION}.jar" \
            "release-artifacts/vies-client-${PROJECT_VERSION}-sources.jar" \
            "release-artifacts/vies-client-${PROJECT_VERSION}-javadoc.jar" \
            release-artifacts/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
